<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #5c84ab; 
    }
    .register-card {
      margin-top: 50px;
      margin-bottom: 50px;
      box-shadow: 3 14px 80px rgba(152, 118, 118, 0.1);
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card register-card">
        <div class="card-body p-8">
          <h2 class="text-center mb-4">Department of Data Science</h2>
          
          <form action="/register" method="POST">
            <div class="mb-3">
              <label for="fullName" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required name="fullname">
            </div>
            <div class="mb-3">
              <label for="emailAddress" class="form-label">Email address</label>
              <input type="email" class="form-control" id="emailAddress" placeholder="name@example.com" required name="email">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" placeholder="Create a password" required >
            </div>
            <div class="mb-4">
              <label for="confirmPassword" class="form-label">Confirm Password</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required name="cpassword">
            </div>
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg">Register</button>
            </div>
          </form>
          <hr class="my-4">
          <div class="text-center">
            <p class="mb-0">Already have an account? <a href="/login">Log in here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
